<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animate</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- animate-bounce -->
    <div class="flex flex-col mt-10 ml-2">
      <div class="w-30 h-30 rounded-full bg-blue-400 animate-bounce"></div>
      <div class="w-30 h-2 rounded-full bg-blue-400 animate-bounce"></div>
    </div>
    <hr class="my-5" />
    <!-- animate-spin -->
    <div
      class="w-30 h-2 mt-15 ml-2 rounded-full bg-blue-400 animate-spin"
    ></div>
    <hr />
    <!-- animate-ping -->
    <div class="w-30 h-30 m-30 rounded-full bg-blue-400 animate-ping"></div>
    <!-- animate-ping -->
    <div class="w-30 h-30 m-30 rounded-full bg-blue-400 animate-pulse"></div>
  </body>
</html>
