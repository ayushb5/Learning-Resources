<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h1 class="text-center text-3xl font-semibold">Positions</h1>
    <hr class="my-2" />
    <div class="bg-violet-300 size-80 relative">
      <div class="bg-red-600 size-24 absolute bottom-0 right-0"></div>
      <div class="bg-green-600 size-24 absolute top-0 right-0"></div>
      <div class="bg-blue-600 size-24 absolute bottom-0 left-0"></div>
      <div class="bg-yellow-600 size-24 absolute top-0 left-0"></div>
    </div>
    <!-- fixed -->
    <div class="bg-blue-500 size-80">
      <h1 class="bg-blue-950 text-white fixed z-10">
        Lorem ipsum dolor sit amet.
      </h1>
    </div>
    <!-- inset -->
    <div class="bg-green-400 size-80 relative">
      <div class="bg-yellow-200 size-32 absolute inset-10"></div>
    </div>
  </body>
</html>
