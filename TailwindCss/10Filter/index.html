<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filters</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <img src="swan.jpg" alt="Swan img" />
    <hr class="my-4" />
    <!-- Blur -->
    <h3 class="text-2xl text-center font-semibold">Blur</h3>
    <hr class="my-4" />
    <img src="swan.jpg" class="blur" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="blur-sm" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="blur-md" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="blur-xl" alt="Swan img" />
    <hr class="my-4" />
    <!-- Brightness -->
    <h3 class="text-2xl text-center font-semibold">Brightness</h3>
    <hr class="my-4" />
    <img src="swan.jpg" class="brightness-50" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="brightness-100" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="brightness-125" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="brightness-200" alt="Swan img" />
    <hr class="my-4" />
    <!-- Contrast -->
    <h3 class="text-2xl text-center font-semibold">Contrast</h3>
    <hr class="my-4" />
    <img src="swan.jpg" class="contrast-0" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="brightness-50" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="brightness-100" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="brightness-125" alt="Swan img" />
    <hr class="my-4" />
    <!-- Grayscale -->
    <h3 class="text-2xl text-center font-semibold">Grayscale</h3>
    <hr class="my-4" />
    <img src="swan.jpg" class="grayscale" alt="Swan img" />
    <hr class="my-4" />
    <!-- Invert -->
    <h3 class="text-2xl text-center font-semibold">Invert</h3>
    <hr class="my-4" />
    <img src="swan.jpg" class="invert" alt="Swan img" />
    <hr class="my-4" />

    <!-- hue -->
    <h3 class="text-2xl text-center font-semibold">Invert</h3>
    <hr class="my-4" />
    <img src="swan.jpg" alt="Swan img" />
    <hr class="my-4" />
    <img src="swan.jpg" class="hue-rotate-15" alt="Swan img" />
    <img src="swan.jpg" class="hue-rotate-30" alt="Swan img" />
    <img src="swan.jpg" class="hue-rotate-45" alt="Swan img" />
    <img src="swan.jpg" class="hue-rotate-60" alt="Swan img" />
    <img src="swan.jpg" class="hue-rotate-75" alt="Swan img" />
    <img src="swan.jpg" class="hue-rotate-90" alt="Swan img" />
    <img src="swan.jpg" class="hue-rotate-105" alt="Swan img" />
    <img src="swan.jpg" class="hue-rotate-145" alt="Swan img" />
    <img src="swan.jpg" class="hue-rotate-180" alt="Swan img" />
    <hr class="my-4" />
  </body>
</html>
