<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Margin and Padding</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div>
      <h1 class="text-3xl font-bold text-center">Margin</h1>
      <h1 class="m-5 bg-red-500 text-yellow-100">Hello World</h1>
      <h1 class="mx-2 bg-red-500 text-yellow-100">Hello World</h1>
      <h1 class="my-3 bg-red-500 text-yellow-100">Hello World</h1>
      <h1 class="mt-10 bg-red-500 text-yellow-100">Hello World</h1>
      <h1 class="mb-10 bg-red-500 text-yellow-100">Hello World</h1>
      <h1 class="ml-10 bg-red-500 text-yellow-100">Hello World</h1>
      <h1 class="mr-10 bg-red-500 text-yellow-100">Hello World</h1>
      <h1 class="text-3xl font-bold text-center mt-10">Padding</h1>
      <h1 class="p-3 bg-red-400 text-white">Hello World</h1>
      <h1 class="px-10 bg-blue-400 text-white">Hello World</h1>
      <h1 class="py-10 bg-green-400">Hello World</h1>
      <h1 class="pt-10 bg-violet-400 text-white">Hello World</h1>
      <h1 class="pb-10 bg-black text-white">Hello World</h1>
      <h1 class="pl-10 bg-zinc-600 text-white">Hello World</h1>
      <h1 class="text-end pr-10 bg-zinc-600 text-white">Hello World</h1>
      <h1 class="text-3xl font-bold text-center mt-10">
        Span with margin and padding
      </h1>
      <hr />
      <span class="text-2xl p-1 m-10 bg-teal-400">Hello World</span>
    </div>
  </body>
</html>
