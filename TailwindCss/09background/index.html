<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="h-56" style="background-image: url(img.jpg)"></div>
    <hr class="my-4" />
    <div
      class="h-96 bg-[url(img.jpg)] bg-no-repeat bg-center bg-container"
    ></div>
    <hr class="my-4" />
    <div
      class="gradient bg-gradient-to-t to-blue-500 from-red-500 size-96"
    ></div>
    <hr class="my-4" />
    <div
      class="gradient bg-gradient-to-b to-blue-500 from-red-500 size-96"
    ></div>
    <hr class="my-4" />
    <div
      class="gradient bg-gradient-to-r to-blue-500 from-red-500 size-96"
    ></div>
    <hr class="my-4" />
    <div
      class="gradient bg-gradient-to-l to-blue-500 from-red-500 size-96"
    ></div>
    <hr class="my-4" />
    <div
      class="gradient bg-gradient-to-tr to-green-500 from-orange-500 size-96"
    ></div>
    <hr class="my-4" />
    <!-- shadow -->
    <div class="mx-auto my-10 size-96 shadow-orange-400 shadow-2xl"></div>
    <hr class="my-4" />
    <div class="mx-auto my-10 size-96 shadow-inner shadow-orange-500"></div>
  </body>
</html>
