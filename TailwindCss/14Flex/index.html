<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="h-screen">
    <div class="bg-gray-300 flex flex-col">
      <div class="bg-red-500 size-20"></div>
      <div class="bg-green-500 size-20"></div>
      <div class="bg-blue-500 size-20"></div>
      <div class="bg-pink-500 size-20"></div>
    </div>
    <hr class="my-5" />
    <div class="bg-gray-300 flex flex-col-reverse">
      <div class="bg-red-500 size-20"></div>
      <div class="bg-green-500 size-20"></div>
      <div class="bg-blue-500 size-20"></div>
      <div class="bg-pink-500 size-20"></div>
    </div>
    <hr class="my-5" />
    <div class="bg-gray-300 flex gap-3 justify-center items-center size-full">
      <div class="bg-red-500 size-20"></div>
      <div class="bg-green-500 size-20"></div>
      <div class="bg-blue-500 size-20"></div>
      <div class="bg-pink-500 size-20"></div>
    </div>
    <hr class="my-5" />
    <div
      class="bg-violet-300 size-full flex flex-wrap content-start sm:flex-row"
    >
      <div class="bg-red-500 size-20"></div>
      <div class="bg-green-500 size-20"></div>
      <div class="bg-blue-500 size-20"></div>
      <div class="bg-pink-500 size-20"></div>
      <div class="bg-red-500 size-20"></div>
      <div class="bg-green-500 size-20"></div>
      <div class="bg-blue-500 size-20"></div>
      <div class="bg-pink-500 size-20"></div>
      <div class="bg-red-500 size-20"></div>
      <div class="bg-green-500 size-20"></div>
      <div class="bg-blue-500 size-20"></div>
      <div class="bg-pink-500 size-20"></div>
    </div>
  </body>
</html>
